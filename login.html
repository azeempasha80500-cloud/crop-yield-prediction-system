<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Yield Prediction - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg, #d4fc79, #96e6a1);
        }

        .login-box{
            width:350px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h1{
            color:#198754;
            margin-bottom:10px;
        }

        .login-box p{
            color:#666;
            margin-bottom:25px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;
            outline:none;
        }

        .input-box input:focus{
            border-color:#198754;
        }

        .btn-login{
            width:100%;
            padding:12px;
            background:#198754;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#157347;
        }

        .register{
            margin-top:15px;
        }

        .register a{
            text-decoration:none;
            color:#198754;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Crop Yield Prediction</h1>
    <p>Login to continue</p>

    <form action="/login" method="POST">

        <div class="input-box">
            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="input-box">
            <input type="password"
                   name="Admin123"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit" class="btn-login">
            Login
        </button>

        <div class="register">
            Don't have an account?
            <a href="/register">Register</a>
        </div>

    </form>
</div>

</body>
</html>
